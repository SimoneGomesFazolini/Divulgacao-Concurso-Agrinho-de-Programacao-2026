<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026 - Futuro Sustentável</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            overflow: hidden; /* Evita rolagem para manter a imagem fixa */
        }

        /* Fundo com a sua imagem */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Certifique-se que o nome da imagem seja imagem.png na mesma pasta */
            background: url('imagem.png') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        /* Escurece levemente apenas para leitura */
        .overlay-dark {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: -1;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Joga o conteúdo para as extremidades */
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            text-align: left;
            padding: 20px;
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: bold;
            color: #76ff03;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            margin: 0;
        }

        /* Painel Inferior de Controles */
        .bottom-controls {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 20px;
            padding-bottom: 30px;
            flex-wrap: wrap;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Player de Som Compacto */
        .audio-mini {
            width: 350px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #playPauseBtn {
            background: #76ff03;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            flex-shrink: 0;
        }

        #seekSlider {
            flex-grow: 1;
            accent-color: #76ff03;
        }

        /* Player de Vídeo Compacto */
        .video-mini {
            width: 300px;
            aspect-ratio: 16/9;
            overflow: hidden;
            border-radius: 10px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .label-small {
            font-size: 12px;
            display: block;
            margin-bottom: 5px;
            color: #76ff03;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="background-overlay"></div>
<div class="overlay-dark"></div>

<div class="container">
    <header>
        <h1 class="logo-text">AGRINHO 2026</h1>
        <p style="text-shadow: 1px 1px 5px #000;">Agro forte, futuro sustentável</p>
    </header>

    <div class="bottom-controls">
        <div class="glass-card audio-mini">
            <audio id="audioElement">
                <source src="Agrinho Pixelado.mp3" type="audio/mpeg">
            </audio>
            <button id="playPauseBtn">▶</button>
            <div style="flex-grow: 1;">
                <span class="label-small">Ouça a Música do Concurso</span>
                <input type="range" id="seekSlider" value="0" step="1">
            </div>
        </div>

        <div class="glass-card">
            <span class="label-small">Vídeo do Projeto</span>
            <div class="video-mini">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
            </div>
        </div>
    </div>
</div>

<script>
    const audio = document.getElementById('audioElement');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const seekSlider = document.getElementById('seekSlider');

    playPauseBtn.addEventListener('click', () => {
        if (audio.paused) {
            audio.play();
            playPauseBtn.innerHTML = "⏸";
        } else {
            audio.pause();
            playPauseBtn.innerHTML = "▶";
        }
    });

    audio.addEventListener('timeupdate', () => {
        seekSlider.value = (audio.currentTime / audio.duration) * 100 || 0;
    });

    seekSlider.addEventListener('input', () => {
        audio.currentTime = audio.duration * (seekSlider.value / 100);
    });
</script>

</body>
</html>
